appId: com.edupass.ccna
---
- launchApp:
    clearState: true

- evalScript: ${output.choice = Math.floor(Math.random() * 2)} 
    
- runFlow:
    when:
      true: ${output.choice == 0}
    commands:
        - tapOn: 
            text: "Skip"

- runFlow:
    when: 
        true: ${output.choice == 1}
    commands:
        - tapOn:
            text: Start
        - runFlow: ../subflows/game_engine.yaml
        - tapOn:
            id: "Submit-btn"
        - tapOn: 
            text: "Confirm"
    
        - tapOn: Start Learning


