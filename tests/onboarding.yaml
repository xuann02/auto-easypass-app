appId: com.edupass.ccna
---
- launchApp:
    clearState: true

- tapOn:
    text: Start
    optional: true
- repeat:
    times: 5
    commands:
      - runScript: ../scripts/answer_logic.js
      - tapOn:
          id: "Check-btn"
      - tapOn:
          id: "Next-btn"
- tapOn: 
    text: "Confirm"
    

# làm màn game
# nộp bài
# sang màn result
# check core xem map với kết quả chạy được không
- tapOn: Start Learning
# vào màn home
