appId: com.edupass.ccna
---

- repeat:
    times: 3
    commands:
      - assertVisible:
          id: "Answer-Question"
      #  1. Scroll đảm bảo load answer
      - scrollUntilVisible:
          element:
            id: "Answer-.*"
            index: 0
          direction: DOWN

      # 2. Đếm số đáp án (max = 7)
      - evalScript: ${output.total = 0}

      - repeat:
          times: 7
          commands:
            - runFlow:
                when:
                  visible:
                    id: "Answer-.*"
                    index: ${output.total}
                commands:
                  - evalScript: ${output.total = output.total + 1}

      # 3. Copy text nếu có multiple
      - evalScript: ${output.hasMultiple = false}
      - evalScript: ${output.required = 1}

      - runFlow:
          when:
            visible:
              id: "hasMultiple-.*"
          commands:
            - copyTextFrom:
                text: "Selected [0-9]+/[0-9]+ answers"
            - evalScript: ${output.hasMultiple = true}
            - evalScript: ${output.requiredText = maestro.copiedText} # Lưu lại text đã copy

      - runScript:
          file: ../scripts/answer_logic.js
          env:
            total: ${output.total}
            hasMultiple: ${output.hasMultiple}
            requiredText: ${output.requiredText}

      - evalScript: ${output.current  = 0}

      # 5. Click các đáp án đã chọn
      - repeat:
          times: ${output.required}
          commands:
            - runFlow:
                commands:
                  - assertVisible:
                      id: "Answer-.*"
                      index: ${output["idx" + output.current]}
                  - tapOn:
                      id: "Answer-.*"
                      # Maestro sẽ giải mã thành output.idx0, output.idx1...
                      index: ${output["idx" + output.current ]}

            - evalScript: ${output.current  = output.current + 1 }
      - assertVisible:
          id: "Check-btn"
      - tapOn:
          id: "Check-btn"
      - assertVisible:
          id: "Answer-Explanation"
      - tapOn:
          id: "Next-btn"

